<!-- @dsCard group="Spacing" viewport="700x180" name="Spacing Scale" subtitle="8-point grid with 4px half-steps" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-en); background: var(--surface); padding: 16px 20px; }
  .row { display: flex; align-items: center; gap: 12px; padding: 3px 0; }
  .bar { background: var(--color-primary-400); height: 14px; border-radius: 3px; }
  .tok { font: var(--type-helper); font-family: var(--font-mono); color: var(--text-secondary); width: 110px; }
  .px { font: var(--type-helper); color: var(--text-muted); width: 38px; text-align: right; }
</style>
</head>
<body>
  <div id="list"></div>
  <script>
    const vals = [4,8,12,16,20,24,32,40,48,64];
    document.getElementById('list').innerHTML = vals.map(v =>
      `<div class="row"><span class="tok">--space-${v}</span><span class="px">${v}</span><span class="bar" style="width:${v}px"></span></div>`
    ).join('');
  </script>
</body>
</html>
