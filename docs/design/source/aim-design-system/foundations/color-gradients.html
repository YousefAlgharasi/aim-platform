<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-en); background: var(--surface); padding: 16px; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .g { height: 84px; border-radius: var(--radius-lg); display: flex; align-items: flex-end; padding: 10px 12px; color: #fff; font: var(--type-caption); font-weight: 700; }
  .lbl { font-family: var(--font-mono); font-weight: 500; opacity: .9; }
  .soft { color: var(--color-primary-700); }
</style>
</head>
<body>
  <div class="grid">
    <div class="g" style="background:var(--gradient-ai)"><span class="lbl">--gradient-ai</span></div>
    <div class="g" style="background:var(--gradient-growth)"><span class="lbl">--gradient-growth</span></div>
    <div class="g soft" style="background:var(--gradient-ai-soft);border:1px solid var(--border)"><span class="lbl">--gradient-ai-soft</span></div>
  </div>
</body>
</html>
