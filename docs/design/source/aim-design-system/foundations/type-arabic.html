<!-- @dsCard group="Type" viewport="700x230" name="Arabic · IBM Plex Sans Arabic" subtitle="RTL specimen — looser leading for readability" -->
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-ar); background: var(--surface); padding: 18px 20px; color: var(--text-primary); }
  .row { display: flex; align-items: baseline; justify-content: space-between; gap: 16px; padding: 7px 0; border-bottom: 1px solid var(--divider); }
  .row:last-child { border-bottom: 0; }
  .spec { font-family: var(--font-mono); font-size: 12px; color: var(--text-muted); white-space: nowrap; direction: ltr; }
  .h1 { font-weight: 700; font-size: 28px; line-height: 40px; }
  .h3 { font-weight: 600; font-size: 19px; line-height: 31px; }
  .bmd { font-weight: 400; font-size: 16px; line-height: 28px; }
  .bsm { font-weight: 400; font-size: 14px; line-height: 25px; color: var(--text-secondary); }
</style>
</head>
<body>
  <div class="row"><span class="h1">تعلّم الإنجليزية بذكاء</span><span class="spec">H1 · 28 · ×1.18 line</span></div>
  <div class="row"><span class="h3">الدرس الموصى به اليوم</span><span class="spec">H3 · 19 · ×1.18</span></div>
  <div class="row"><span class="bmd">يتكيّف الذكاء الاصطناعي مع مستواك في كل خطوة.</span><span class="spec">Body M · 16 · ×1.18</span></div>
  <div class="row"><span class="bsm">نص ثانوي أصغر للتفاصيل الإضافية في البطاقة.</span><span class="spec">Body S · 14 · ×1.18</span></div>
</body>
</html>
