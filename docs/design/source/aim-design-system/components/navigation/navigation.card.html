<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-en); background: var(--background); padding: 24px; color: var(--text-primary); }
  .sec { font: var(--type-label); text-transform: uppercase; color: var(--text-muted); margin: 0 0 12px; letter-spacing: .04em; }
  .block { margin-bottom: 26px; }
  .row { display: flex; flex-wrap: wrap; gap: 16px; align-items: center; }
  .phone { width: 300px; border: 1px solid var(--border); border-radius: var(--radius-xl); overflow: hidden; box-shadow: var(--shadow-card); background: var(--surface); }
  .phone__body { height: 120px; background: var(--gradient-ai-soft); display: flex; align-items: center; justify-content: center; color: var(--text-muted); font: var(--type-caption); }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Tabs, SegmentedControl, BottomNav, TopAppBar, IconButton } = window.AIMDesignSystem_e594fb;
    const ic = (d) => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{d}</svg>;
    const Home = ic(<path d="M3 11l9-8 9 8M5 10v10h14V10"/>);
    const Book = ic(<path d="M4 4h13a2 2 0 0 1 2 2v14H6a2 2 0 0 1-2-2zM4 4v14"/>);
    const Mic = ic(<g><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0M12 17v4"/></g>);
    const User = ic(<g><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></g>);
    const Gear = ic(<g><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M5 5l2 2M17 17l2 2M19 5l-2 2M7 17l-2 2"/></g>);

    function Demo() {
      const [tab, setTab] = React.useState('progress');
      const [mode, setMode] = React.useState('Weekly');
      const [nav, setNav] = React.useState('learn');
      return (
        <>
          <div className="block">
            <div className="sec">Tabs</div>
            <Tabs value={tab} onChange={setTab} items={[
              {value:'lessons', label:'Lessons'},
              {value:'progress', label:'Progress', count:3},
              {value:'review', label:'Review'},
            ]} />
          </div>

          <div className="block">
            <div className="sec">Segmented control</div>
            <div className="row">
              <SegmentedControl value={mode} onChange={setMode} items={['Daily','Weekly','Monthly']} />
              <div dir="rtl"><SegmentedControl value={mode} onChange={setMode} items={[{value:'Daily',label:'يومي'},{value:'Weekly',label:'أسبوعي'},{value:'Monthly',label:'شهري'}]} /></div>
            </div>
          </div>

          <div className="block">
            <div className="sec">Top app bar &amp; bottom nav</div>
            <div className="phone">
              <TopAppBar title="Speaking Practice" onBack={()=>{}} actions={<IconButton ariaLabel="Settings">{Gear}</IconButton>} />
              <div className="phone__body">screen content</div>
              <BottomNav value={nav} onChange={setNav} items={[
                {value:'home', label:'Home', icon:Home},
                {value:'learn', label:'Learn', icon:Book},
                {value:'practice', label:'Practice', icon:Mic},
                {value:'profile', label:'Profile', icon:User, badge:2},
              ]} />
            </div>
          </div>
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
  </script>
</body>
</html>
