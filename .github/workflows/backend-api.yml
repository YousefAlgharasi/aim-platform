name: Backend API — Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'services/backend-api/**'
      - '.github/workflows/backend-api.yml'
  pull_request:
    branches: [main]
    paths:
      - 'services/backend-api/**'
      - '.github/workflows/backend-api.yml'

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: services/backend-api

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/backend-api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint src --ext .ts || true

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test
        env:
          NODE_ENV: test

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render Deploy
        run: |
          curl --fail -X POST \
            "https://api.render.com/v1/services/${{ secrets.RENDER_BACKEND_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": false}'

      - name: Wait for deploy
        run: |
          echo "Deploy triggered. Check status at https://dashboard.render.com"
