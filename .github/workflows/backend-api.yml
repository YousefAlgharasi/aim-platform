name: Backend API CI

on:
  push:
    branches: [main]
    paths:
      - 'services/backend-api/**'
      - '.github/workflows/backend-api.yml'
  pull_request:
    branches: [main]
    paths:
      - 'services/backend-api/**'
      - '.github/workflows/backend-api.yml'

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: services/backend-api

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: services/backend-api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test
        env:
          NODE_ENV: test

    # Phase 1 boundary guards
    # No AIM Engine logic in Backend API tests
    # No exposed AI provider keys or Supabase service-role keys
    # No Student Web App routes
