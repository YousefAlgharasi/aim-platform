name: Student Web CI

on:
  push:
    branches: [main]
    paths:
      - 'apps/student-web/**'
      - '.github/workflows/student-web.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/student-web/**'
      - '.github/workflows/student-web.yml'

jobs:
  typecheck-build-test:
    name: Typecheck, Build & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/student-web

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Test with coverage
        run: npx react-scripts test --coverage --watchAll=false || true

      - name: Audit dependencies
        run: npm audit --audit-level=high || true
