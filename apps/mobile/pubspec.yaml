name: aim_mobile
description: Flutter Mobile learner client shell for the AIM Platform.
publish_to: "none"

version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  http: ^1.2.2
  flutter_secure_storage: ^9.0.0
  permission_handler: ^11.3.1
  http_parser: ^4.0.2
  app_links: ^6.3.2
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
