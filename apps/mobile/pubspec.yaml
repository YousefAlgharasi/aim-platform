name: aim_mobile
description: Flutter Mobile learner client shell for the AIM Platform.
publish_to: "none"

version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  flutter_riverpod: ^2.5.1
  go_router: ^14.6.2
  http: ^1.2.2
  flutter_secure_storage: ^9.0.0
  permission_handler: ^11.3.1
  http_parser: ^4.0.2
  app_links: ^6.3.2
  url_launcher: ^6.3.1
  # Runtime API (FlutterNativeSplash.preserve/remove) is called from
  # main.dart and splash_page.dart, so this is a regular dependency even
  # though its CLI generator (`dart run flutter_native_splash:create`) is
  # dev-tooling.
  flutter_native_splash: ^2.4.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/splash/

# Native splash-screen config, consumed by `dart run
# flutter_native_splash:create` to generate the Android/iOS launch resources.
# The background_image/image are renders of the exact same AimGradients.gzHero
# gradient and icon badge SplashPage (lib/features/onboarding/ui/pages/
# splash_page.dart) uses, so the native splash and the first Flutter frame
# match. `color` and `background_image` are mutually exclusive in this
# package (setting both silently drops background_image) — background_image
# is used here so pre-Android-12/iOS show the real gradient, not a flat
# color. Android 12+'s native SplashScreen API only supports a solid
# background/icon color (no images) — android_12.color/icon_background_color
# below are the closest single-color approximation of the gradient, a
# platform limitation, not a simplification we chose. icon_background_color
# matches color exactly so the icon's own translucent badge doesn't sit on
# top of a second, visibly-different circle.
flutter_native_splash:
  background_image: "assets/splash/splash_background.png"
  image: assets/splash/splash_logo.png
  android_12:
    image: assets/splash/splash_logo.png
    color: "#6C63FF"
    icon_background_color: "#6C63FF"
  android: true
  ios: true
  web: false
